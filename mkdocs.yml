site_name: lieplusplus_py
site_description: Python bindings for the Lie++ C++ library
site_author: Jesús Bautista Villar
copyright: Copyright &copy; 2024 Jesús Bautista Villar

repo_url: https://gitea.lyapunov.local/Swarm-Systems-Lab/lieplusplus_py

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 2
            show_submodules: true
            show_root_toc_entry: true
            allow_inspection: true

nav:
  - Home: index.md
  - Golden Path:
      - Development Setup: golden-path.md
      - Toolchain & Build: golden-path/toolchain.md
      - Architectural Decisions: golden-path/adrs.md
      - Tutorials: golden-path/tutorials.md
  - Usage: usage.md
  - API Reference: api.md
  - Examples: examples.md
  - Contributing: contributing.md
  - Troubleshooting: troubleshooting.md
