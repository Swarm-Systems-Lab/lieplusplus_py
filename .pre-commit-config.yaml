repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: generate-pybind11-stubs
        name: Regenerate pybind11 stubs (_core.pyi)
        description: Rebuilds the extension and regenerates src/lieplusplus/_core.pyi whenever the C++ bindings change
        entry: ssl-pydev generate-stubs --module lieplusplus._core --output src/
        language: system
        files: ^(src/bindings\.cpp|CMakeLists\.txt)$
        pass_filenames: false
