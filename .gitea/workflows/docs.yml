name: Docs

on:
  push:
    tags:
      - "v*"

jobs:
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3-dev

      - name: Prepare Python environment (dev,docs)
        run: ./scripts/ci/setup-env.sh --groups dev,docs

      - name: Build documentation
        run: uv run mkdocs build --strict
