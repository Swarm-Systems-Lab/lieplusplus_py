name: Publish Python package

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          REF=${GITHUB_REF:-${GITEA_REF:-}}
          echo "Resolved ref: ${REF}"
          if [ -z "$REF" ]; then
            echo "Tag ref not found (GITHUB_REF/GITEA_REF)" >&2
            exit 1
          fi
          VERSION=${REF#refs/tags/v}
          if [ "$VERSION" = "$REF" ]; then
            VERSION=${REF#refs/tags/}
          fi
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using version: $VERSION"

      - name: Install system build dependencies
        run: |
          set -eux
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3-dev

      - name: Prepare Python environment
        run: |
          ./scripts/ci/setup-env.sh build cibuildwheel==2.* twine

      - name: Build package (publish build)
        env:
          CIBW_ENVIRONMENT: "SETUPTOOLS_SCM_PRETEND_VERSION=${SETUPTOOLS_SCM_PRETEND_VERSION}"
          CIBW_ENVIRONMENT_PASS_LINUX: "SETUPTOOLS_SCM_PRETEND_VERSION"
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "pp*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_MANYLINUX_X86_64: "manylinux_2_28"
          CIBW_BUILD_VERBOSITY: "1"
        run: ./scripts/release/build_publish.sh

      - name: Verify dist artifacts
        run: |
          . .venv/bin/activate
          python -m twine check dist/*

      - name: Publish to internal PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
          TWINE_REPOSITORY_URL: ${{ secrets.PYPI_REPOSITORY_URL }}
        run: ./scripts/release/publish_ci.sh
