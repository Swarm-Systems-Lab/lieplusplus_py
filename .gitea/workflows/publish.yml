name: Publish Python package

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          REF=${GITHUB_REF:-${GITEA_REF:-}}
          echo "Resolved ref: ${REF}"
          if [ -z "$REF" ]; then
            echo "Tag ref not found (GITHUB_REF/GITEA_REF)" >&2
            exit 1
          fi
          if [[ "$REF" == refs/tags/* ]]; then
            VERSION=${REF#refs/tags/v}
            if [ "$VERSION" = "$REF" ]; then
              VERSION=${REF#refs/tags/}
            fi
          else
            VERSION="0.0.0-dev"
          fi
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using version: $VERSION"

      - name: Setup system and python environment
        uses: ./.gitea/workflows/_env_setup

      - name: Unit tests (gate)
        run: just test-multi-py

      - name: Build package (publish build)
        env:
          CIBW_ENVIRONMENT: "SETUPTOOLS_SCM_PRETEND_VERSION=${SETUPTOOLS_SCM_PRETEND_VERSION}"
          CIBW_ENVIRONMENT_PASS_LINUX: "SETUPTOOLS_SCM_PRETEND_VERSION"
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "pp* *musllinux*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_MANYLINUX_X86_64: "manylinux_2_28"
          CIBW_BUILD_VERBOSITY: "1"
        run: ./scripts/release/build_publish.sh

      - name: Verify dist artifacts
        run: |
          . .venv/bin/activate
          python -m twine check dist/*

      - name: Publish to internal PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
          TWINE_REPOSITORY_URL: ${{ secrets.PYPI_REPOSITORY_URL }}
        run: ./scripts/release/publish_ci.sh
