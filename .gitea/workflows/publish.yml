name: Publish Python package

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Docker availability
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker is not installed in the runner."
            exit 1
          fi
          docker --version
          if ! docker info >/dev/null 2>&1; then
            echo "Docker daemon is unreachable."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build cibuildwheel==2.* twine

      - name: Build package (publish build)
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "pp*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_MANYLINUX_X86_64: "manylinux_2_28"
          CIBW_BUILD_VERBOSITY: "1"
        run: ./scripts/release/build_publish.sh

      - name: Verify dist artifacts
        run: python -m twine check dist/*

      - name: Publish to internal PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
          TWINE_REPOSITORY_URL: ${{ secrets.PYPI_REPOSITORY_URL }}
        run: ./scripts/release/publish_ci.sh
