name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3-dev

      - name: Create Python venv and install uv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync deps (frozen)
        run: |
          . .venv/bin/activate
          uv sync --all-groups --frozen

      # ---- BLOCKING CHECK ----
      - name: Unit tests (gate)
        run: |
          . .venv/bin/activate
          ./scripts/ci/test.sh

      # ---- NON-BLOCKING CHECKS ----
      - name: pre-commit checks
        continue-on-error: true
        run: |
          . .venv/bin/activate
          ./scripts/ci/pre-commit.sh

      - name: Typing checks
        continue-on-error: true
        run: |
          . .venv/bin/activate
          ./scripts/ci/typecheck.sh
