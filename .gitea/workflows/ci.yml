name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3-dev

      - name: Prepare Python environment (dev)
        run: ./scripts/ci/setup-env.sh --groups dev

      # ---- BLOCKING CHECK ----
      - name: Unit tests (gate)
        run: ./scripts/ci/test.sh

      - name: pre-commit checks
        run: ./scripts/ci/pre-commit.sh

      - name: Lint
        run: ./scripts/ci/lint.sh

      - name: Typing checks
        continue-on-error: true
        run: ./scripts/ci/typecheck.sh
