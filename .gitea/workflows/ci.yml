name: CI

on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  fast-checks:
    name: Fast checks (gate)
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Sync deps (frozen)
        run: uv sync --all-groups --frozen

      - name: Run unit tests
        run: ./scripts/ci/test.sh

  pre-commit:
    name: pre-commit checks (non-blocking)
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    continue-on-error: true
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
      - run: pip install uv
      - run: uv sync --all-groups --frozen
      - run: ./scripts/ci/pre-commit.sh

  typing:
    name: Typing checks (non-blocking)
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    continue-on-error: true
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
      - run: pip install uv
      - run: uv sync --all-groups --frozen
      - run: ./scripts/ci/typecheck.sh
