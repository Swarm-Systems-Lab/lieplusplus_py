name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  fast-checks:
    name: Fast checks (gate)
    runs-on: ubuntu-latest
    # Use runner environment (provides node for JS-based actions) and install required system build tools below
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Gitea can mirror this locally

      - name: Install system build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential cmake ninja-build pkg-config python3-dev

      - name: Create Python venv and install uv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync deps (frozen)
        run: |
          . .venv/bin/activate
          uv sync --all-groups --frozen

      - name: Run unit tests
        run: ./scripts/ci/test.sh

  pre-commit:
    name: pre-commit checks (non-blocking)
    runs-on: ubuntu-latest
    # Use runner environment and install build tools below
    continue-on-error: true
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
      - name: Install system build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential cmake ninja-build pkg-config python3-dev

      - name: Create Python venv and install uv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync deps (frozen)
        run: |
          . .venv/bin/activate
          uv sync --all-groups --frozen
      - run: ./scripts/ci/pre-commit.sh

  typing:
    name: Typing checks (non-blocking)
    runs-on: ubuntu-latest
    # Use runner environment and install build tools below
    continue-on-error: true
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
      - name: Install system build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y build-essential cmake ninja-build pkg-config python3-dev

      - name: Create Python venv and install uv
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync deps (frozen)
        run: |
          . .venv/bin/activate
          uv sync --all-groups --frozen
      - run: ./scripts/ci/typecheck.sh
