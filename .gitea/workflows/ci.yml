name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Fast checks (gate)
            script: ./scripts/ci/test.sh
            allow_failure: false

          - name: pre-commit checks (non-blocking)
            script: ./scripts/ci/pre-commit.sh
            allow_failure: true

          - name: Typing checks (non-blocking)
            script: ./scripts/ci/typecheck.sh
            allow_failure: true

    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3-dev

      - name: Create Python venv and install uv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install uv

      - name: Sync deps (frozen)
        run: |
          . .venv/bin/activate
          uv sync --all-groups --frozen

      - name: Run check
        run: |
          . .venv/bin/activate
          ${{ matrix.script }}
